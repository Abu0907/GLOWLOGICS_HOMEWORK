<!DOCTYPE html>
<html>
    <head>
        <title>homework 1</title>
        <style>
            form{
                text-align: center;
                padding: 20px;
            }
            form input,label{
                margin: 10px;
            }
            input[type="submit"]{
                background-color: rgb(230, 58, 10);
                color: white;
                border: none;
                padding: 5px 30px;
                border-radius: 15px;
                cursor: pointer;
            }
            input[type="text"],input[type="password"]{
                width: 200px;
                background-color: rgb(1, 1, 96);
                color: white;
            }
        </style>
    </head>
    <body>
        <form action="">
            <h1>Login Page</h1>
            <label for="Username">Username:-</label>
            <input type="text" name="Username" required>
            <br>
            <label for="Password">Password:-</label>
            <input type="password" name="Password" required>
            <br>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
